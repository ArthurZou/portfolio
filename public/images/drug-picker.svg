<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 100" fill="none">
  <!-- Pill bottle -->
  <rect x="240" y="10" width="54" height="90" rx="7" fill="#6366F1"/>
  <rect x="240" y="10" width="54" height="24" rx="7" fill="#818CF8"/>
  <rect x="248" y="0" width="38" height="17" rx="4" fill="#A5B4FC"/>
  <rect x="252" y="38" width="36" height="24" rx="4" fill="white" opacity="0.9"/>
  <text x="270" y="54" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#6366F1" font-weight="600">Rx</text>

  <!-- Capsule 1 -->
  <g transform="translate(350, 20) rotate(12)">
    <rect x="0" y="0" width="58" height="22" rx="11" fill="#F472B6"/>
    <rect x="29" y="0" width="29" height="22" rx="11" fill="#FB923C"/>
  </g>

  <!-- Capsule 2 -->
  <g transform="translate(60, 40) rotate(-8)">
    <rect x="0" y="0" width="53" height="19" rx="10" fill="#34D399"/>
    <rect x="26" y="0" width="27" height="19" rx="10" fill="#6EE7B7"/>
  </g>

  <!-- Capsule 3 -->
  <g transform="translate(470, 50) rotate(-15)">
    <rect x="0" y="0" width="53" height="19" rx="10" fill="#818CF8"/>
    <rect x="26" y="0" width="27" height="19" rx="10" fill="#A5B4FC"/>
  </g>

  <!-- Round pill 1 -->
  <circle cx="430" cy="30" r="18" fill="#FBBF24"/>
  <circle cx="430" cy="30" r="12" fill="#FCD34D" opacity="0.7"/>
  <line x1="418" y1="30" x2="442" y2="30" stroke="white" stroke-width="2" opacity="0.5"/>

  <!-- Round pill 2 -->
  <circle cx="150" cy="25" r="14" fill="#F87171"/>
  <circle cx="150" cy="25" r="10" fill="#FCA5A5" opacity="0.6"/>

  <!-- Tablet -->
  <ellipse cx="530" cy="35" rx="22" ry="13" fill="#60A5FA" transform="rotate(-10, 530, 35)"/>
  <line x1="518" y1="32" x2="542" y2="38" stroke="white" stroke-width="1.5" opacity="0.4"/>

  <!-- Small pills -->
  <circle cx="120" cy="70" r="8" fill="#C084FC"/>
  <circle cx="500" cy="75" r="6" fill="#22D3EE"/>
  <circle cx="320" cy="8" r="5" fill="#FB7185"/>
  <circle cx="190" cy="75" r="6" fill="#FBBF24" opacity="0.7"/>
  <circle cx="560" cy="65" r="7" fill="#34D399" opacity="0.6"/>
  <circle cx="30" cy="30" r="6" fill="#60A5FA" opacity="0.5"/>

  <!-- Cross symbol -->
  <g transform="translate(80, 15)">
    <rect x="-7" y="-2.5" width="14" height="5" rx="2" fill="#10B981"/>
    <rect x="-2.5" y="-7" width="5" height="14" rx="2" fill="#10B981"/>
  </g>

  <!-- Sparkle dots -->
  <circle cx="580" cy="20" r="3" fill="#A78BFA" opacity="0.6"/>
  <circle cx="40" cy="80" r="3" fill="#F9A8D4" opacity="0.6"/>
  <circle cx="400" cy="80" r="2.5" fill="#67E8F9" opacity="0.5"/>
</svg>
